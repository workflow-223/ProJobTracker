name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --base-href /ProJobTracker/
      - uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: build/web
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
